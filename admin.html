<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Participa+</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F0E6C8;
    --paper-deep:#E8DAB2;
    --ink:#211A12;
    --ink-soft:#4A4030;
    --azul:#1C4E80;
    --azul-deep:#123354;
    --azul-mid:#3E6F9E;
    --azul-pale:#8FB4D1;
    --line: rgba(33,26,18,0.16);
    --card-bg:#fff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:var(--paper);
    background-image: radial-gradient(circle at 1px 1px, rgba(33,26,18,0.06) 1px, transparent 0);
    background-size: 22px 22px;
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
  }
  .wrap{ max-width:820px; margin:0 auto; padding:0 20px; }

  /* ---- tela de login ---- */
  #loginScreen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .login-card{
    background:var(--card-bg); border:2px solid var(--ink); border-radius:6px;
    box-shadow:6px 6px 0 var(--line);
    padding:40px 36px; width:100%; max-width:360px; text-align:center;
  }
  .login-card h1{
    font-family:'Fraunces', serif; font-size:26px; margin:0 0 6px;
  }
  .login-card p{ color:var(--ink-soft); font-size:14px; margin:0 0 22px; }
  .login-card input{
    width:100%; padding:12px 14px; font-size:15px; border:2px solid var(--line);
    border-radius:4px; margin-bottom:14px; font-family:inherit; background:#fff; color:var(--ink);
  }
  .login-card input:focus{ outline:none; border-color:var(--azul); }
  .login-card button{
    width:100%; padding:12px; font-size:15px; font-weight:600; border:2px solid var(--ink);
    border-radius:4px; background:var(--azul); color:#fff; cursor:pointer; box-shadow:3px 3px 0 var(--ink);
  }
  .login-card button:hover{ transform:translate(-1px,-1px); }
  .login-error{ color:#a33; font-size:13px; margin-top:10px; min-height:16px; }

  /* ---- painel ---- */
  #dashboard{ display:none; padding:40px 0 80px; }
  .admin-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-wrap:wrap; gap:12px;}
  .admin-header h1{ font-family:'Fraunces', serif; font-size:30px; margin:0; }
  .logout-btn{
    background:none; border:2px solid var(--ink); border-radius:4px; padding:8px 14px;
    font-size:13px; cursor:pointer; color:var(--ink);
  }
  .warning-banner{
    background:#fff3cd; border:2px solid #c9a24b; border-radius:4px; padding:12px 16px;
    font-size:13.5px; margin:18px 0 26px; color:#5c4813;
  }
  .filters{ display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; }
  .filters button{
    background:#fff; border:2px solid var(--ink); border-radius:20px; padding:6px 16px;
    font-size:13px; cursor:pointer; color:var(--ink);
  }
  .filters button.active{ background:var(--azul); color:#fff; }
  .empty-state{ text-align:center; color:var(--ink-soft); padding:60px 20px; font-size:15px; }

  .registro-card{
    background:var(--card-bg); border:2px solid var(--ink); border-radius:6px;
    padding:22px; margin-bottom:18px; box-shadow:4px 4px 0 var(--line);
  }
  .registro-top{ display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
  .registro-meta{ font-size:12.5px; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace; }
  .badge{
    display:inline-block; font-size:11px; font-weight:600; text-transform:uppercase;
    padding:3px 10px; border-radius:20px; letter-spacing:.04em;
  }
  .badge.pendente{ background:#f7dede; color:#8a2c2c; }
  .badge.andamento{ background:#fdeecb; color:#8a5a13; }
  .badge.respondido{ background:#dcefe0; color:#276b3d; }
  .registro-titulo{ font-weight:600; font-size:15px; margin:2px 0 8px; }
  .registro-desc{ font-size:14px; line-height:1.5; margin-bottom:12px; }
  .registro-local{ font-size:13px; color:var(--ink-soft); margin-bottom:14px; }
  .resposta-area{ border-top:1px dashed var(--line); padding-top:14px; }
  .resposta-area label{ display:block; font-size:12.5px; font-weight:600; margin-bottom:6px; color:var(--azul-deep); }
  .resposta-area textarea{
    width:100%; min-height:70px; padding:10px 12px; border:2px solid var(--line); border-radius:4px;
    font-family:inherit; font-size:14px; resize:vertical; margin-bottom:10px; color:var(--ink);
  }
  .resposta-row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .resposta-row select{
    padding:8px 10px; border:2px solid var(--line); border-radius:4px; font-family:inherit; font-size:13px;
  }
  .save-btn{
    background:var(--azul); color:#fff; border:2px solid var(--ink); border-radius:4px;
    padding:9px 18px; font-size:13.5px; font-weight:600; cursor:pointer; box-shadow:2px 2px 0 var(--ink);
  }
  .save-btn:hover{ transform:translate(-1px,-1px); }
  .saved-note{ font-size:12.5px; color:#276b3d; margin-left:6px; display:none; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h1>Participa<strong style="color:var(--azul);">+</strong></h1>
    <p>Área restrita · digite a senha de administrador</p>
    <input type="password" id="passwordInput" placeholder="Senha">
    <button id="loginBtn">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="dashboard">
  <div class="wrap">
    <div class="admin-header">
      <h1>Registros recebidos</h1>
      <button class="logout-btn" id="logoutBtn">Sair</button>
    </div>
    <div class="warning-banner">
      Estes registros estão salvos apenas neste navegador (armazenamento local), como demonstração. Para receber os registros de todos os moradores em qualquer dispositivo, é preciso conectar um banco de dados real ao site.
    </div>
    <div class="filters" id="filters">
      <button data-filter="todos" class="active">Todos</button>
      <button data-filter="pendente">Pendentes</button>
      <button data-filter="andamento">Em andamento</button>
      <button data-filter="respondido">Respondidos</button>
    </div>
    <div id="listaRegistros"></div>
  </div>
</div>

<script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ==== CONFIGURAÇÃO DO SUPABASE ====
  // Cole aqui os mesmos valores usados no participa-mais.html
  const SUPABASE_URL = "COLE_AQUI_SUA_SUPABASE_URL";
  const SUPABASE_ANON_KEY = "COLE_AQUI_SUA_ANON_KEY";
  const participaDB = (SUPABASE_URL.startsWith('http'))
    ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  const ADMIN_PASSWORD = "icoparticipa2026"; // troque essa senha aqui quando quiser

  const loginScreen = document.getElementById('loginScreen');
  const dashboard = document.getElementById('dashboard');
  const passwordInput = document.getElementById('passwordInput');
  const loginError = document.getElementById('loginError');

  function tryLogin(){
    if(passwordInput.value === ADMIN_PASSWORD){
      sessionStorage.setItem('participaAdminLogado', '1');
      showDashboard();
    } else {
      loginError.textContent = 'Senha incorreta. Tente novamente.';
      passwordInput.value = '';
    }
  }
  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  passwordInput.addEventListener('keydown', e => { if(e.key === 'Enter') tryLogin(); });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('participaAdminLogado');
    dashboard.style.display = 'none';
    loginScreen.style.display = 'flex';
    passwordInput.value = '';
  });

  function showDashboard(){
    loginScreen.style.display = 'none';
    dashboard.style.display = 'block';
    renderLista();
  }

  if(sessionStorage.getItem('participaAdminLogado') === '1'){
    showDashboard();
  }

  let filtroAtual = 'todos';
  document.querySelectorAll('#filters button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filtroAtual = btn.dataset.filter;
      renderLista();
    });
  });

  async function getRegistros(){
    if(participaDB){
      const { data, error } = await participaDB.from('registros').select('*').order('created_at', { ascending: false });
      if(error){ console.error(error); return []; }
      return data;
    }
    return JSON.parse(localStorage.getItem('participaRegistros') || '[]');
  }

  async function atualizarRegistro(id, resposta, status){
    if(participaDB){
      const { error } = await participaDB.from('registros').update({ resposta, status }).eq('id', id);
      if(error){ console.error(error); return false; }
      return true;
    }
    const todos = JSON.parse(localStorage.getItem('participaRegistros') || '[]');
    const idx = todos.findIndex(x => x.id === id);
    if(idx > -1){
      todos[idx].resposta = resposta;
      todos[idx].status = status;
      localStorage.setItem('participaRegistros', JSON.stringify(todos));
    }
    return true;
  }

  function statusLabel(s){
    return { pendente:'Pendente', andamento:'Em andamento', respondido:'Respondido' }[s] || 'Pendente';
  }

  async function renderLista(){
    const lista = await getRegistros();
    const filtrada = filtroAtual === 'todos' ? lista : lista.filter(r => (r.status||'pendente') === filtroAtual);
    const container = document.getElementById('listaRegistros');
    container.innerHTML = '';

    if(filtrada.length === 0){
      container.innerHTML = '<div class="empty-state">Nenhum registro por aqui ainda.</div>';
      return;
    }

    filtrada.forEach(r => {
      const status = r.status || 'pendente';
      const card = document.createElement('div');
      card.className = 'registro-card';
      const dataFmt = new Date(r.created_at || r.data).toLocaleString('pt-BR');
      card.innerHTML = `
        <div class="registro-top">
          <span class="registro-meta">${dataFmt} · ${r.nome || 'Anônimo'} · ${r.bairro || '—'}</span>
          <span class="badge ${status}">${statusLabel(status)}</span>
        </div>
        <div class="registro-titulo">${r.categoria || 'Sem categoria'}</div>
        <div class="registro-desc">${(r.descricao || '').replace(/</g,'&lt;')}</div>
        ${r.foto_url ? `<img src="${r.foto_url}" style="max-width:220px; border-radius:4px; border:2px solid var(--line); margin-bottom:12px; display:block;">` : ''}
        ${r.localizacao ? `<div class="registro-local">📍 ${r.localizacao}</div>` : ''}
        <div class="resposta-area">
          <label>Resposta da Prefeitura / Câmara</label>
          <textarea placeholder="Escreva a resposta para este morador...">${r.resposta || ''}</textarea>
          <div class="resposta-row">
            <select>
              <option value="pendente" ${status==='pendente'?'selected':''}>Pendente</option>
              <option value="andamento" ${status==='andamento'?'selected':''}>Em andamento</option>
              <option value="respondido" ${status==='respondido'?'selected':''}>Respondido</option>
            </select>
            <button class="save-btn">Salvar</button>
            <span class="saved-note">Salvo ✓</span>
          </div>
        </div>
      `;
      const textarea = card.querySelector('textarea');
      const select = card.querySelector('select');
      const saveBtn = card.querySelector('.save-btn');
      const savedNote = card.querySelector('.saved-note');

      saveBtn.addEventListener('click', async () => {
        const ok = await atualizarRegistro(r.id, textarea.value, select.value);
        if(ok){
          savedNote.style.display = 'inline';
          setTimeout(() => { savedNote.style.display = 'none'; }, 1800);
          card.querySelector('.badge').className = 'badge ' + select.value;
          card.querySelector('.badge').textContent = statusLabel(select.value);
        } else {
          alert('Não foi possível salvar. Tente novamente.');
        }
      });

      container.appendChild(card);
    });
  }
</script>
</body>
</html>
